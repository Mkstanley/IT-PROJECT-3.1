<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My account — KejaHunt</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .acct-hero { background: linear-gradient(180deg,#fff,var(--bg)); border-bottom:1px solid var(--line); padding: 32px 0; }
    .acct-hero .inner { display:flex; align-items:center; gap:20px; }
    .acct-hero .avatar { width:74px; height:74px; font-size:26px; }
    .acct-hero h1 { font-size:26px; }
    .acct-hero .meta { display:flex; gap:16px; margin-top:6px; color:var(--muted); font-size:13.5px; flex-wrap:wrap; }
    .acct-hero .meta span { display:flex; align-items:center; gap:6px; }
    .acct-hero .meta svg { width:15px; height:15px; }
    .layout { display:grid; grid-template-columns: 230px 1fr; gap:32px; padding: 28px 0 64px; align-items:start; }
    .acct-tabs { position:sticky; top:calc(var(--nav-h) + 20px); display:flex; flex-direction:column; gap:4px; }
    .acct-tabs button { display:flex; align-items:center; gap:11px; padding:11px 14px; border-radius:var(--r); font-weight:600; font-size:14.5px; color:var(--ink-2); text-align:left; }
    .acct-tabs button svg { width:18px; height:18px; color:var(--muted); }
    .acct-tabs button:hover { background:var(--bg-2); }
    .acct-tabs button.on { background:var(--green-tint); color:var(--green-dark); }
    .acct-tabs button.on svg { color:var(--green-dark); }
    .tabpanel { display:none; }
    .tabpanel.on { display:block; animation: fade .25s; }
    @keyframes fade { from { opacity:0; transform:translateY(6px); } }
    .panel-title { font-size:20px; margin-bottom:4px; }
    .viewing { display:flex; align-items:center; gap:14px; padding:16px; border:1px solid var(--line); border-radius:var(--r); margin-bottom:12px; }
    .viewing .v-thumb { width:64px;height:52px;border-radius:8px;flex:none; }
    @media (max-width: 900px){ .layout{ grid-template-columns:1fr; } .acct-tabs{ position:static; flex-direction:row; overflow-x:auto; } }
  </style>
</head>
<body>
  <div id="nav"></div>
  <div id="gate"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    KejaUI.mountNav('');
    let u = KH.currentUser();
    if (!u) { KH.loginAs('u_t1'); u = KH.currentUser(); } // demo convenience

    document.getElementById('gate').innerHTML = `
      <div class="acct-hero">
        <div class="wrap inner">
          <span class="avatar">${KejaUI.initials(u.name)}</span>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:10px"><h1>${u.name}</h1>${u.verified?`<span class="badge badge-verified">${ICN.shield} Verified</span>`:'<span class="badge badge-pending">Unverified</span>'}</div>
            <div class="meta">
              <span>${ICN.mail} ${u.email}</span>
              <span>${ICN.phone} ${u.phone}</span>
              <span>${ICN.calendar} Joined ${u.joined}</span>
              <span class="badge badge-neutral" style="text-transform:capitalize">${u.role}</span>
            </div>
          </div>
          <button class="btn btn-ghost" id="logout">${ICN.logout} Log out</button>
        </div>
      </div>

      <div class="wrap layout">
        <nav class="acct-tabs">
          <button data-tab="saved" class="on">${ICN.heart} Saved homes</button>
          <button data-tab="viewings">${ICN.calendar} Viewings</button>
          <button data-tab="messages">${ICN.msg} Messages</button>
          <button data-tab="profile">${ICN.user} Profile & settings</button>
        </nav>

        <main>
          <section class="tabpanel on" id="tab-saved">
            <h2 class="panel-title">Saved homes</h2>
            <p class="muted" style="margin-bottom:20px">Listings you've bookmarked. We'll alert you if the price changes.</p>
            <div class="listing-grid" id="savedGrid"></div>
            <div id="savedEmpty"></div>
          </section>

          <section class="tabpanel" id="tab-viewings">
            <h2 class="panel-title">Your viewings & enquiries</h2>
            <p class="muted" style="margin-bottom:20px">Homes you've contacted a landlord about.</p>
            <div id="viewingsList"></div>
          </section>

          <section class="tabpanel" id="tab-messages">
            <h2 class="panel-title">Messages</h2>
            <p class="muted" style="margin-bottom:20px">Your conversations with landlords and agents.</p>
            <div id="msgList"></div>
            <a href="messages.html" class="btn btn-soft" style="margin-top:8px">Open full inbox ${ICN.arrow}</a>
          </section>

          <section class="tabpanel" id="tab-profile">
            <h2 class="panel-title">Profile & settings</h2>
            <p class="muted" style="margin-bottom:20px">Keep your details up to date.</p>
            <div class="card card-pad" style="max-width:560px">
              <form id="profForm">
                <div class="field"><label>Full name</label><input class="input" name="name" value="${u.name}"></div>
                <div class="grid-2">
                  <div class="field"><label>Email</label><input class="input" name="email" value="${u.email}"></div>
                  <div class="field"><label>Phone</label><input class="input" name="phone" value="${u.phone}"></div>
                </div>
                <div class="field"><label>Preferred areas</label><input class="input" name="areas" placeholder="e.g. Kilimani, South B" value="Kilimani, South B"></div>
                <div class="field"><label>Budget ceiling</label><input class="input" name="budget" value="KES 45,000"></div>
                <button class="btn btn-primary" type="submit">Save changes</button>
              </form>
            </div>
            <div class="card card-pad" style="max-width:560px;margin-top:18px">
              <h3 style="font-size:16px;margin-bottom:6px">Data & privacy</h3>
              <p class="muted" style="font-size:13.5px;margin-bottom:14px">Your personal data is processed in line with the Kenya Data Protection Act (2019). You can export or delete your data anytime.</p>
              <div style="display:flex;gap:10px"><button class="btn btn-ghost btn-sm">Export my data</button><button class="btn btn-ghost btn-sm" id="resetDemo">Reset demo data</button></div>
            </div>
          </section>
        </main>
      </div>
    `;

    // tabs
    document.querySelectorAll('.acct-tabs button').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('.acct-tabs button').forEach(x=>x.classList.remove('on'));
      document.querySelectorAll('.tabpanel').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      document.getElementById('tab-'+b.dataset.tab).classList.add('on');
    }));

    // saved
    const saved = KH.favorites().map(id=>KH.listing(id)).filter(Boolean);
    const sg = document.getElementById('savedGrid');
    if (saved.length) saved.forEach(l => sg.appendChild(KejaUI.listingCard(l)));
    else document.getElementById('savedEmpty').innerHTML = `<div class="empty"><div class="e-ic">${ICN.heart}</div><h3 style="color:var(--ink)">No saved homes yet</h3><p>Tap the heart on any listing to save it here.</p><a href="listings.html" class="btn btn-primary" style="margin-top:12px">Browse rentals</a></div>`;

    // viewings (derived from threads)
    const threads = KH.threads(u.id);
    const vl = document.getElementById('viewingsList');
    if (threads.length) {
      threads.forEach(t => {
        const l = KH.listing(t.listingId);
        if (!l) return;
        vl.appendChild(KejaUI.el(`<div class="viewing">
          <div class="v-thumb ph"></div>
          <div style="flex:1"><div style="font-weight:700">${l.title}</div><div class="muted" style="font-size:13px">${l.hood} · ${KejaUI.fmtKES(l.rent)}/mo · enquiry sent</div></div>
          <span class="badge badge-info">In conversation</span>
          <a href="property.html?id=${l.id}" class="btn btn-ghost btn-sm">View</a>
        </div>`));
      });
    } else { vl.innerHTML = `<div class="empty"><div class="e-ic">${ICN.calendar}</div><p>No viewings booked yet.</p></div>`; }

    // messages preview
    const ml = document.getElementById('msgList');
    if (threads.length) {
      threads.forEach(t => {
        const l = KH.listing(t.listingId);
        const other = KH.user(t.landlordId);
        const last = t.messages[t.messages.length-1];
        ml.appendChild(KejaUI.el(`<a class="viewing" href="messages.html?t=${t.id}">
          <span class="avatar" style="width:46px;height:46px">${KejaUI.initials(other.name)}</span>
          <div style="flex:1"><div style="font-weight:700">${other.name} <span class="muted" style="font-weight:500;font-size:12px">· ${l?l.hood:''}</span></div><div class="muted" style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:360px">${last?last.text:''}</div></div>
          <span style="color:var(--muted)">${ICN.arrow}</span>
        </a>`));
      });
    } else { ml.innerHTML = `<p class="muted">No messages yet.</p>`; }

    // profile save
    document.getElementById('profForm').addEventListener('submit', e => {
      e.preventDefault();
      const f = new FormData(e.target);
      KH.all().users.find(x=>x.id===u.id).name = f.get('name');
      KejaUI.toast('Profile saved');
    });
    document.getElementById('logout').addEventListener('click', () => { KH.logout(); KejaUI.toast('Logged out'); setTimeout(()=>location.href='index.html',600); });
    document.getElementById('resetDemo').addEventListener('click', () => { KH.reset(); KejaUI.toast('Demo data reset'); setTimeout(()=>location.reload(),700); });

    KejaUI.mountFooter();
  </script>
</body>
</html>
